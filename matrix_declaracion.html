<!DOCTYPE html>
<html lang="es" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Matrix - Declaración Romántica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        mono: ['"Courier New"', 'Courier', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --theme-dark: #000a00;
            --theme-main: #00ff41;
            --theme-light: #b8ffb8;
            --theme-shadow: rgba(0, 255, 65, 0.15);
            --theme-glow: rgba(0, 255, 65, 0.8);
            --theme-glow-dim: rgba(0, 255, 65, 0.4);
            --theme-bg-fade: rgba(0, 10, 0, 0.05);
            --theme-border: rgba(0, 255, 65, 0.3);
        }
        body.romantic-mode {
            --theme-dark: #1a0005;
            --theme-main: #ff3366; 
            --theme-light: #ff99b3;
            --theme-shadow: rgba(255, 51, 102, 0.2);
            --theme-glow: rgba(255, 51, 102, 0.8);
            --theme-glow-dim: rgba(255, 51, 102, 0.4);
            --theme-bg-fade: rgba(26, 0, 5, 0.05);
            --theme-border: rgba(255, 51, 102, 0.3);
        }
        body {
            background-color: var(--theme-dark);
            color: var(--theme-main);
            transition: background-color 2s ease, color 2s ease;
        }

        @keyframes floatMessage {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); filter: blur(4px); }
            20% { opacity: 0.8; transform: translateY(0px) scale(1); filter: blur(0px); }
            80% { opacity: 0.8; transform: translateY(-40px) scale(1.05); filter: blur(0px); }
            100% { opacity: 0; transform: translateY(-60px) scale(1.1); filter: blur(8px); }
        }
        .floating-message {
            font-size: 1.25rem;
            font-weight: bold;
            color: var(--theme-light);
            text-shadow: 0 0 15px var(--theme-glow);
            animation: floatMessage 6s ease-in-out forwards;
            white-space: nowrap; 
        }
        @media (max-width: 768px) {
            .floating-message {
                font-size: 0.85rem; 
            }
        }
    </style>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-terminal {
                @apply bg-black/60 backdrop-blur-md rounded-2xl;
                border: 1px solid var(--theme-border);
                box-shadow: 0 0 40px var(--theme-shadow);
                transition: border-color 2s ease, box-shadow 2s ease;
            }
            .text-glow {
                color: var(--theme-light);
                text-shadow: 0 0 10px var(--theme-glow), 0 0 20px var(--theme-glow-dim);
                transition: text-shadow 2s ease, color 2s ease;
            }
            .btn-theme {
                @apply px-4 py-2 md:px-6 md:py-3 font-mono text-xs sm:text-sm md:text-base uppercase tracking-widest rounded-sm relative overflow-hidden whitespace-nowrap;
                background-color: transparent;
                border: 1px solid var(--theme-main);
                color: var(--theme-main);
                transition: background-color 0.3s ease, border-color 2s ease, color 2s ease, box-shadow 0.3s ease, transform 0.2s ease;
            }
            .btn-theme:hover {
                background-color: var(--theme-main);
                color: var(--theme-dark) !important;
                box-shadow: 0 0 20px var(--theme-glow);
            }
        }
    </style>
</head>
<body class="h-screen w-screen overflow-hidden font-mono relative flex items-center justify-center m-0 p-0 touch-none">

    <!-- 1. PANTALLA DE PRE-ARRANQUE -->
    <div id="pre-boot" class="absolute inset-0 z-[60] bg-black flex items-center justify-center cursor-pointer transition-opacity duration-1000">
        <p class="text-red-600 font-mono text-sm md:text-xl font-bold animate-pulse tracking-widest text-shadow-[0_0_10px_rgba(255,0,0,0.8)] text-center px-4 leading-relaxed">
            [ PELIGRO: BRECHA EN EL SISTEMA - TOCA PARA INTERVENIR ]
        </p>
    </div>

    <!-- 2. PANTALLA DE ARRANQUE -->
    <div id="boot-screen" class="absolute inset-0 z-50 bg-black flex flex-col items-center justify-center opacity-0 transition-opacity duration-1000 hidden">
        <div id="red-alert-flash" class="absolute inset-0 bg-red-600/20 opacity-0 pointer-events-none transition-opacity duration-100"></div>
        <button id="btn-start" class="btn-theme text-sm sm:text-lg md:text-xl bg-red-600/10 border-red-600 text-red-500 hover:bg-red-600 z-10 w-[85%] md:w-auto text-center px-2 py-4">
            > INICIAR PROTOCOLO_
        </button>
    </div>

    <!-- Canvas -->
    <canvas id="matrix-canvas" class="absolute inset-0 z-0"></canvas>
    
    <div id="vignette" class="absolute inset-0 z-10 pointer-events-none transition-colors duration-[2000ms]" 
         style="background: radial-gradient(circle at center, transparent 0%, var(--theme-dark) 100%); opacity: 0.85;"></div>

    <!-- Terminal Principal -->
    <main class="relative z-20 flex flex-col items-center justify-center p-6 md:p-12 glass-terminal w-[92%] max-w-lg md:max-w-4xl md:min-w-[700px] min-h-[250px] md:min-h-[300px] transition-transform duration-1000 transform scale-95 opacity-0" id="main-terminal">
        
        <h1 id="decoder-text" class="text-lg sm:text-2xl md:text-4xl leading-snug md:leading-relaxed font-bold tracking-widest text-glow text-center mb-8 md:mb-12 min-h-[80px] flex items-center justify-center w-full break-words"></h1>

        <div id="actions" class="flex flex-col sm:flex-row gap-4 md:gap-8 opacity-0 transition-opacity duration-1000 w-full sm:w-auto items-center justify-center">
            <button id="btn-yes" class="btn-theme group w-auto">
                <span class="relative z-10 font-bold transition-colors duration-200 text-sm md:text-base">Conectarme (Sí)</span>
                <div class="absolute inset-0 h-full w-0 bg-white/30 group-hover:w-full transition-all duration-300 ease-out z-0"></div>
            </button>
            <button id="btn-no" class="btn-theme text-red-500 border-red-500/50 bg-red-500/10 hover:bg-red-500 hover:text-white hover:shadow-[0_0_20px_rgba(239,68,68,0.6)] w-auto text-sm md:text-base">
                Desconectar
            </button>
        </div>
    </main>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = new AudioContext(); // Se crea inicialmente suspendido
        let alarmInterval;
        let romanticBuffer = null;
        
        const preBoot = document.getElementById('pre-boot');
        const bootScreen = document.getElementById('boot-screen');
        const terminalEl = document.getElementById('main-terminal');
        const redFlash = document.getElementById('red-alert-flash');

        // Precargar el archivo de audio en memoria usando fetch (solución definitiva para móviles)
        fetch('romantico.mp3')
            .then(response => response.arrayBuffer())
            .then(arrayBuffer => audioCtx.decodeAudioData(arrayBuffer))
            .then(audioBuffer => { romanticBuffer = audioBuffer; })
            .catch(e => console.log("No se pudo cargar romantico.mp3. Asegúrate de que el archivo existe y estás en un servidor local.", e));

        let hasBooted = false;
        preBoot.addEventListener('click', () => {
            if (hasBooted) return; // Evitar multiples clics que rompen el audio
            hasBooted = true;

            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            preBoot.style.opacity = '0';
            setTimeout(() => { preBoot.style.display = 'none'; }, 1000);

            bootScreen.classList.remove('hidden');
            setTimeout(() => { bootScreen.classList.remove('opacity-0'); }, 50);

            let alarmCount = 0;
            function triggerAlarm() {
                if (alarmCount > 15 || audioCtx.state === 'suspended') {
                    clearInterval(alarmInterval); 
                    return;
                }
                redFlash.classList.add('opacity-100');
                setTimeout(() => redFlash.classList.remove('opacity-100'), 150);

                const osc1 = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc1.type = 'sawtooth';
                osc2.type = 'sawtooth';
                
                osc1.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.8);
                
                osc2.frequency.setValueAtTime(620, audioCtx.currentTime);
                osc2.frequency.exponentialRampToValueAtTime(210, audioCtx.currentTime + 0.8);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.05); 
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime + 0.6); 
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.9); 
                
                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc1.start(audioCtx.currentTime);
                osc2.start(audioCtx.currentTime);
                osc1.stop(audioCtx.currentTime + 0.9);
                osc2.stop(audioCtx.currentTime + 0.9);
                
                alarmCount++;
            }

            triggerAlarm();
            alarmInterval = setInterval(triggerAlarm, 1200);
        });

        function playBeep(freq, duration) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        let hasStarted = false;
        document.getElementById('btn-start').addEventListener('click', () => {
            if (hasStarted) return;
            hasStarted = true;

            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            clearInterval(alarmInterval);
            redFlash.style.display = 'none';
            
            bootScreen.style.opacity = '0';
            setTimeout(() => { bootScreen.style.display = 'none'; }, 1000);

            setTimeout(() => {
                terminalEl.classList.remove('opacity-0', 'scale-95');
                terminalEl.classList.add('opacity-100', 'scale-100');
                
                // ==== CUENTA REGRESIVA ====
                let count = 3;
                // Hacer el texto gigante temporalmente
                decoderEl.classList.add('text-7xl', 'md:text-9xl');
                decoderEl.innerText = count;
                playBeep(800, 0.1);

                const countInterval = setInterval(() => {
                    count--;
                    if (count > 0) {
                        decoderEl.innerText = count;
                        playBeep(800, 0.1);
                    } else {
                        clearInterval(countInterval);
                        // Restaurar tamaño de texto
                        decoderEl.classList.remove('text-7xl', 'md:text-9xl');
                        decoderEl.innerText = "";
                        playBeep(1200, 0.4); // Tono agudo de inicio
                        
                        setTimeout(playSequence, 500);
                    }
                }, 1000);

            }, 500);
        });

        function playDataSound() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(Math.random() * 3000 + 1000, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        // ==========================================
        // MENSAJES FLOTANTES ROMÁNTICOS
        // ==========================================
        function spawnRomanticMessages() {
            const msgs = [
                "Eres lo que siempre esperé...",
                "En tu mirada encuentro Paz...",
                "Eres el color que me da alegría...",
                "Mi lugar seguro...",
                "Mi mejor coincidencia...",
                "Contigo todo tiene sentido...",
                "Te elegiría mil veces más..."
            ];

            setInterval(() => {
                const msg = msgs[Math.floor(Math.random() * msgs.length)];
                
                const terminal = document.getElementById('main-terminal');
                const rect = terminal.getBoundingClientRect();
                
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const halfW = rect.width / 2;
                const halfH = rect.height / 2;
                
                const isMobile = window.innerWidth < 768;
                const padding = isMobile ? 30 : 60; 
                let x, y;

                const side = isMobile ? (Math.random() > 0.5 ? 0 : 2) : Math.floor(Math.random() * 4);
                
                if (side === 0) { // Arriba
                    x = centerX - halfW + Math.random() * rect.width;
                    y = centerY - halfH - padding - (Math.random() * 50);
                } else if (side === 1) { // Derecha
                    x = centerX + halfW + padding + (Math.random() * 20);
                    y = centerY - halfH + Math.random() * rect.height;
                } else if (side === 2) { // Abajo
                    x = centerX - halfW + Math.random() * rect.width;
                    y = centerY + halfH + padding + (Math.random() * 50);
                } else { // Izquierda
                    x = centerX - halfW - padding - 150 - (Math.random() * 20); 
                    y = centerY - halfH + Math.random() * rect.height;
                }

                x = Math.max(10, Math.min(x, window.innerWidth - 200));
                y = Math.max(10, Math.min(y, window.innerHeight - 50));

                const container = document.createElement('div');
                container.style.position = 'absolute';
                container.style.left = `${x}px`;
                container.style.top = `${y}px`;
                container.style.zIndex = '15';
                container.style.pointerEvents = 'none';
                
                const rot = (Math.random() - 0.5) * 15;
                container.style.transform = `rotate(${rot}deg)`;

                const textSpan = document.createElement('span');
                textSpan.className = 'floating-message inline-block';
                textSpan.innerText = msg;

                container.appendChild(textSpan);
                document.body.appendChild(container);

                setTimeout(() => { container.remove(); }, 6000);
            }, 1200);
        }

        // ==========================================
        // EFECTO LLUVIA DINÁMICA
        // ==========================================
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const matrixChars = 'ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'.split('');
        const romanticChars = ['❤', '💕', '💖', '🌸', '✨', 'A', 'M', 'O', 'R', 'T', 'E', 'Q', 'U', 'I', 'E', 'R', 'O', 'I', 'N', 'F', 'I', 'N', 'I', 'T', 'O'];

        let currentChars = matrixChars;
        const fontSize = window.innerWidth < 768 ? 12 : 16;
        let columns = canvas.width / fontSize;
        let drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            const rootStyle = getComputedStyle(document.body);
            const mainColor = rootStyle.getPropertyValue('--theme-main').trim() || '#00ff41';
            const lightColor = rootStyle.getPropertyValue('--theme-light').trim() || '#b8ffb8';
            const bgFade = rootStyle.getPropertyValue('--theme-bg-fade').trim() || 'rgba(0, 10, 0, 0.05)';

            ctx.fillStyle = bgFade;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = currentChars[Math.floor(Math.random() * currentChars.length)];
                ctx.fillStyle = Math.random() > 0.98 ? lightColor : mainColor;
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = canvas.width / fontSize;
            if (drops.length < columns) {
                const extension = Array(Math.floor(columns) - drops.length).fill(1);
                drops = drops.concat(extension);
            }
        });

        // ==========================================
        // HISTORIA SECUENCIAL Y DECODIFICACIÓN
        // ==========================================
        const sequence = [
            "INICIANDO ESCANEO...",
            "ANOMALÍA DETECTADA: LATIDOS ACELERADOS.",
            "ERES LA CONEXIÓN QUE SIEMPRE BUSQUÉ.",
            "¿QUIERES ESTAR CONMIGO?"
        ];
        
        const decoderEl = document.getElementById('decoder-text');
        const actionsEl = document.getElementById('actions');
        
        let currentMessageIndex = 0;

        function playSequence() {
            if (currentMessageIndex >= sequence.length) return;

            const targetMessage = sequence[currentMessageIndex];
            let iterations = 0;
            
            const decodeInterval = setInterval(() => {
                decoderEl.innerText = targetMessage.split('').map((letter, index) => {
                    if (letter === ' ') return ' ';
                    if (index < iterations) return letter;
                    return matrixChars[Math.floor(Math.random() * matrixChars.length)];
                }).join('');
                
                if (Math.random() > 0.3) playDataSound();

                if (iterations >= targetMessage.length) {
                    clearInterval(decodeInterval);
                    
                    if (currentMessageIndex === sequence.length - 1) {
                        actionsEl.classList.remove('opacity-0');
                        
                        // Esperar 1.5 segundos antes de activar la trampa para que el usuario pueda ver el botón
                        setTimeout(() => { trapActive = true; }, 1500);

                        setTimeout(() => {
                            document.body.classList.add('romantic-mode');
                            currentChars = romanticChars;
                            
                            // Activar Audio Romántico usando Web Audio API (Inmune a bloqueos móviles)
                            if (romanticBuffer && audioCtx) {
                                const source = audioCtx.createBufferSource();
                                source.buffer = romanticBuffer;
                                source.loop = true;
                                
                                const gainNode = audioCtx.createGain();
                                gainNode.gain.setValueAtTime(0, audioCtx.currentTime); // Volumen inicial 0
                                
                                source.connect(gainNode);
                                gainNode.connect(audioCtx.destination);
                                
                                source.start(0);
                                
                                // Fade In suave hasta volumen 0.9 en 2.5 segundos
                                gainNode.gain.linearRampToValueAtTime(0.9, audioCtx.currentTime + 2.5);
                            } else {
                                console.log("El buffer romántico no estaba listo.");
                            }
                            
                            document.querySelector('#btn-yes span').innerText = "¡SÍ, QUIERO! 💕";
                            document.getElementById('btn-no').innerText = "Me lo pierdo :(";

                            spawnRomanticMessages();
                        }, 800);
                    } else {
                        currentMessageIndex++;
                        setTimeout(playSequence, 2000); 
                    }
                }
                iterations += 1/3; 
            }, 30);
        }

        // ==========================================
        // MICRO-INTERACCIONES Y TRAMPA DE MÓVIL
        // ==========================================
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        let trapActive = false; // Candado para evitar que huya al aparecer si el ratón ya estaba ahí
        let escapeCount = 0; // Contador de persecución
        let lastEscapeTime = 0; // Temporizador para evitar eventos dobles en móviles

        function attemptEscape(e) {
            // Prevenir click/touch por defecto
            if (e && e.cancelable && e.type !== 'mouseover') e.preventDefault();
            
            if (!trapActive) return;

            const now = Date.now();
            // Ignorar eventos múltiples generados por un solo toque en pantalla (ej. touchstart + click simultáneo)
            if (now - lastEscapeTime < 200) return;
            lastEscapeTime = now;

            escapeCount++;

            // Al quinto intento, el sistema "falla" adrede
            if (escapeCount >= 5) {
                // Si el botón ya se había rendido y el usuario le hace clic, desaparece como humo
                if (btnNo.innerText === "Me rindo..." && e && (e.type === 'click' || e.type === 'touchstart')) {
                    btnNo.style.transition = 'all 0.4s cubic-bezier(0.6, -0.28, 0.735, 0.045)';
                    btnNo.style.opacity = '0';
                    btnNo.style.transform = 'scale(0.2)';
                    setTimeout(() => { btnNo.style.display = 'none'; }, 400);
                    return;
                }

                decoderEl.innerText = "¡Yo sé que quieres, dale que SÍ! 😏";
                decoderEl.style.color = '#ff99b3';
                decoderEl.style.textShadow = '0 0 10px rgba(255, 51, 102, 0.8)';
                
                // El botón "Me lo pierdo" se rinde, PERO sigue siendo clickeable
                btnNo.innerText = "Me rindo...";
                btnNo.style.opacity = '0.6';
                btnNo.style.cursor = 'pointer';
                return;
            }

            // Si es un reflejo rápido (clic o touch) en los intentos 1 al 4
            if (e && (e.type === 'click' || e.type === 'touchstart')) {
                decoderEl.innerText = "¡Casi! Pero no... 😏";
            }

            // Asegurar estilos antes de calcular (forzar reflow)
            btnNo.style.width = 'auto';
            btnNo.style.margin = '0';
            void btnNo.offsetWidth; // FORZAR REFLOW MÓVIL

            // SOLUCIÓN CLAVE: Mover al body
            if (btnNo.parentNode !== document.body) {
                document.body.appendChild(btnNo);
            }

            const isMobile = window.innerWidth < 768;
            const paddingX = isMobile ? 20 : 50;
            const paddingY = isMobile ? 20 : 50;
            
            // Usamos innerWidth porque position:fixed SIEMPRE respeta el Layout Viewport
            const maxX = window.innerWidth - btnNo.offsetWidth - (paddingX * 2);
            const maxY = window.innerHeight - btnNo.offsetHeight - (paddingY * 2);
            
            const x = paddingX + (Math.random() * Math.max(0, maxX));
            const y = paddingY + (Math.random() * Math.max(0, maxY));
            
            btnNo.style.position = 'fixed';
            btnNo.style.left = `${x}px`;
            btnNo.style.top = `${y}px`;
            btnNo.style.transform = 'none'; 
            btnNo.style.zIndex = '100';
        }

        btnNo.addEventListener('mouseover', attemptEscape);
        btnNo.addEventListener('touchstart', attemptEscape, {passive: false});
        btnNo.addEventListener('click', attemptEscape);

        function startHeartConfetti() {
            const emojis = ['❤', '💕', '💖', '🌸', '✨'];
            // Lluvia infinita de corazones
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
                heart.style.position = 'fixed';
                heart.style.left = Math.random() * window.innerWidth + 'px';
                heart.style.top = '-50px'; // Nace arriba de la pantalla
                heart.style.fontSize = (Math.random() * 25 + 15) + 'px';
                heart.style.zIndex = '100'; // Por encima de la terminal de cristal
                heart.style.pointerEvents = 'none'; // Para que no bloqueen clics
                
                // Rotación y caída suave
                const rotStart = Math.random() * 360;
                const rotEnd = rotStart + (Math.random() * 360 - 180);
                const driftX = (Math.random() - 0.5) * 300; // Desplazamiento horizontal (viento)

                document.body.appendChild(heart);

                const duration = Math.random() * 3000 + 3000;
                const animation = heart.animate([
                    { transform: `translate3d(0, 0px, 0) rotate(${rotStart}deg)`, opacity: 1 },
                    { transform: `translate3d(${driftX}px, ${window.innerHeight + 100}px, 0) rotate(${rotEnd}deg)`, opacity: 0 }
                ], {
                    duration: duration,
                    easing: 'linear'
                });

                // Limpieza de memoria
                animation.onfinish = () => heart.remove();
            }, 80); // Crea un nuevo corazón cada 80ms
        }

        btnYes.addEventListener('click', () => {
            decoderEl.innerText = "SISTEMA COMPROMETIDO: TE AMO 💕✨";
            decoderEl.style.color = '#ffffff';
            actionsEl.style.display = 'none';
            // ¡Desatar la lluvia de corazones!
            startHeartConfetti();
        });

    </script>
</body>
</html>
